name: 摩托范签到

on:
  schedule:
    - cron: '0 2 * * *'  # UTC时间，对应北京时间10点
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install axios
          npm install undici

      - name: Execute checkin
        run: node 58moto.js
        env:
          SHARGE: ${{ secrets.MTF }}

      - name: Output execution result
        if: always()
        run: echo "签到任务已完成"
