name: 闪极签到

on:
  schedule:
    - cron: '0 1 * * *'  # UTC时间，对应北京时间9点
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios

      - name: Execute checkin
        run: node 闪极签到.js
        env:
          SHARGE: ${{ secrets.SHARGE }}

      - name: Output execution result
        if: always()
        run: echo "签到任务已完成"
